name: Deploy frontend to Cloudflare Pages

on:
  push:
    branches:
      - main
    paths:
      - "frontend/**"
      - ".github/workflows/cloudflare-pages.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_PAGES_PROJECT: pursuitdesk

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Skip when Cloudflare credentials are not configured
        if: ${{ env.CLOUDFLARE_API_TOKEN == '' || env.CLOUDFLARE_ACCOUNT_ID == '' }}
        run: |
          echo "::notice title=Cloudflare deploy skipped::Set repository variable CLOUDFLARE_ACCOUNT_ID and secret CLOUDFLARE_API_TOKEN to enable automatic Pages deploys."

      - name: Deploy static frontend
        if: ${{ env.CLOUDFLARE_API_TOKEN != '' && env.CLOUDFLARE_ACCOUNT_ID != '' }}
        run: |
          npx wrangler@4 pages deploy frontend \
            --project-name "$CLOUDFLARE_PAGES_PROJECT" \
            --branch "$GITHUB_REF_NAME" \
            --commit-hash "$GITHUB_SHA"
