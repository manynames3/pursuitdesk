name: Validate

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Python syntax check
        run: |
          python -m py_compile \
            src/proposal_writer_lambda.py \
            src/api_v1_endpoints.py \
            src/db_admin_lambda.py \
            src/gsa_api_ingest.py \
            src/partner_matching.py \
            src/mock_data_seeder.py

      - name: Frontend JavaScript syntax check
        run: node --check frontend/app.js

      - name: Terraform format check
        run: terraform -chdir=infra/terraform fmt -check

      - name: Terraform validate
        run: |
          terraform -chdir=infra/terraform init -backend=false
          terraform -chdir=infra/terraform validate

      - name: Whitespace check
        run: git diff --check
