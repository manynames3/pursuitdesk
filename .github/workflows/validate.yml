name: Validate

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Python syntax check
        run: |
          python -m py_compile \
            src/proposal_writer_lambda.py \
            src/api_v1_endpoints.py \
            src/db_admin_lambda.py \
            src/gsa_api_ingest.py \
            src/partner_matching.py \
            src/mock_data_seeder.py

      - name: Install Python dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Python unit tests
        run: python -m unittest discover -s tests -p 'test_*.py'

      - name: Frontend JavaScript syntax check
        run: node --check frontend/app.js

      - name: Frontend formatting tests
        run: node --test tests/*.test.mjs

      - name: Install Playwright
        run: |
          npm install --prefix /tmp/pursuitdesk-playwright --no-save @playwright/test@1.61.1
          /tmp/pursuitdesk-playwright/node_modules/.bin/playwright install --with-deps chromium

      - name: Frontend e2e smoke
        run: |
          python -m http.server 4173 --directory frontend >/tmp/pursuitdesk-frontend.log 2>&1 &
          server_pid=$!
          trap 'kill "$server_pid"' EXIT
          sleep 2
          NODE_PATH=/tmp/pursuitdesk-playwright/node_modules node tests/e2e_pursuitdesk_smoke.cjs

      - name: Terraform format check
        run: terraform -chdir=infra/terraform fmt -check

      - name: Terraform validate
        run: |
          terraform -chdir=infra/terraform init -backend=false
          terraform -chdir=infra/terraform validate

      - name: Whitespace check
        run: git diff --check
